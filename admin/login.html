<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login - CodeShala</title>
     <!-- ⭐ FAVICON - Sahi Path (.. ke saath) -->
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <link rel="shortcut icon" type="image/png" href="../assets/images/favicon.png">
    <link rel="apple-touch-icon" href="../assets/images/favicon.png">
    <link rel="stylesheet" href="../assets/css/auth-style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div class="form-box login">
            <form id="adminLoginForm">
                <h1>👨‍🏫 Teacher Login</h1>
                <p>Access your teaching dashboard</p>
                
                <div class="input-box">
                    <input type="email" id="adminEmail" placeholder="Email" required>
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box">
                    <input type="password" id="adminPassword" placeholder="Password" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <div class="forgot-link">
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <p class="error-msg" id="adminError"></p>
                
                <p class="back-home">
                    <a href="../index.html">← Back to Home</a>
                </p>
            </form>
        </div>

        <!-- Register Form -->
        <div class="form-box register">
            <form id="adminSignupForm">
                <h1>📝 Register</h1>
                <p>Create your teacher account</p>
                
                <div class="input-box">
                    <input type="text" id="adminName" placeholder="Full Name" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="email" id="adminSignupEmail" placeholder="Email" required>
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box">
                    <input type="password" id="adminSignupPassword" placeholder="Password (6+ characters)" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <div class="input-box">
                    <input type="text" id="adminCode" placeholder="Teacher Access Code" required>
                    <i class='bx bxs-key'></i>
                </div>
                <button type="submit" class="btn">Register as Teacher</button>
                <p class="error-msg" id="adminSignupError"></p>
                
                <p class="back-home">
                    <a href="../index.html">← Back to Home</a>
                </p>
            </form>
        </div>

        <!-- Toggle Panel -->
        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>👋 Hello, Teacher!</h1>
                <p>New to CodeShala? Register with access code.</p>
                <button class="btn register-btn">Register</button>
            </div>

            <div class="toggle-panel toggle-right">
                <h1>👨‍🏫 Welcome Back!</h1>
                <p>Already have a teacher account?</p>
                <button class="btn login-btn">Sign In</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/firebase-config.js"></script>
    <script src="../assets/js/sheets-api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/common.js"></script>
    
    <!-- Toggle Script -->
    <script>
        const container = document.querySelector('.container');
        const registerBtn = document.querySelector('.register-btn');
        const loginBtn = document.querySelector('.login-btn');

        registerBtn.addEventListener('click', () => {
            container.classList.add('active');
        });

        loginBtn.addEventListener('click', () => {
            container.classList.remove('active');
        });

        // Admin Login
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const errorEl = document.getElementById('adminError');
            
            errorEl.textContent = '';
            
            const result = await login(email, password);
            if (!result.success) {
                errorEl.textContent = result.error;
            }
        });

        // Admin Signup
        document.getElementById('adminSignupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('adminName').value;
            const email = document.getElementById('adminSignupEmail').value;
            const password = document.getElementById('adminSignupPassword').value;
            const code = document.getElementById('adminCode').value;
            const errorEl = document.getElementById('adminSignupError');
            
            errorEl.textContent = '';
            
            // Simple access code check
            if (code !== 'CODESHALA2026') {
                errorEl.textContent = 'Invalid teacher access code!';
                return;
            }
            
            if (password.length < 6) {
                errorEl.textContent = 'Password must be at least 6 characters';
                return;
            }
            
            const result = await signUp(email, password, name, 'admin');
            if (!result.success) {
                errorEl.textContent = result.error;
            }
        });
    </script>
</body>
</html>
