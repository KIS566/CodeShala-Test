<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Test - CodeShala Admin</title>
    <!-- ⭐ FAVICON - Sahi Path (.. ke saath) -->
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <link rel="shortcut icon" type="image/png" href="../assets/images/favicon.png">
    <link rel="apple-touch-icon" href="../assets/images/favicon.png">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <style>
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
        .form-full{grid-column:1/-1}
        .form-card{background:white;border:1px solid var(--border);border-radius:var(--radius-xl);padding:28px;box-shadow:var(--shadow-xs)}
        .form-card h2{font-size:1.1rem;margin-bottom:20px}
        .form-group{margin-bottom:18px}
        .form-group label{display:block;font-weight:600;font-size:.85rem;margin-bottom:6px}
        .form-group input,.form-group textarea,.form-group select{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);outline:none}
        .form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(99,102,241,.08);background:white}
        .btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;border-radius:12px;font-weight:700;font-size:1rem;cursor:pointer}
        .btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(99,102,241,.35)}
        .success-box{display:none;text-align:center;padding:30px}
        .success-box.show{display:block}
        .test-list-item{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border-light);flex-wrap:wrap;gap:10px}
        .test-list-item:last-child{border-bottom:none}
        .btn-sm{padding:6px 14px;border-radius:8px;border:1.5px solid var(--border);background:white;cursor:pointer;font-weight:600;font-size:.8rem;text-decoration:none;color:var(--text)}
        .btn-sm:hover{border-color:var(--primary);color:var(--primary)}
        .status-badge{padding:4px 10px;border-radius:20px;font-size:.72rem;font-weight:700;text-transform:uppercase}
        .status-badge.active{background:#ecfdf5;color:#059669}
        .status-badge.draft{background:#fffbeb;color:#d97706}
        .btn-outline{background:white;border:1.5px solid var(--border);color:var(--text)}
        .btn-outline:hover{border-color:var(--primary);color:var(--primary)}
        @media(max-width:768px){.form-grid{grid-template-columns:1fr}}
        .empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}
        .empty-state i{font-size:2.8rem;margin-bottom:12px;opacity:.4;display:block}
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><a href="../index.html" class="logo"><span class="logo-icon">⚡</span><span>Code<span class="grad-text">Shala</span></span></a><span class="admin-badge">Admin</span></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class='bx bxs-dashboard'></i><span>Dashboard</span></a>
                <a href="create-test.html" class="nav-item active"><i class='bx bxs-plus-circle'></i><span>Create Test</span></a>
                <a href="add-questions.html" class="nav-item"><i class='bx bxs-help-circle'></i><span>Add Questions</span></a>
                <a href="view-results.html" class="nav-item"><i class='bx bxs-bar-chart-alt-2'></i><span>View Results</span></a>
                <a href="check-answers.html" class="nav-item"><i class='bx bxs-check-shield'></i><span>Check Answers</span></a>
                <a href="manage-students.html" class="nav-item"><i class='bx bxs-group'></i><span>Students</span></a>
            </nav>
            <div class="sidebar-footer"><a href="#" onclick="logout()" class="nav-item logout"><i class='bx bxs-log-out-circle'></i><span>Logout</span></a></div>
        </aside>
        <main class="main-content">
            <header class="topbar"><button class="menu-toggle" id="menuToggle"><i class='bx bx-menu'></i></button><span style="font-weight:700">Create New Test</span><span class="admin-email" id="adminEmail"></span></header>
            <div class="content">
                <div class="form-grid">
                    <div class="form-card" id="createForm"><h2>📝 Test Details</h2>
                        <form id="testForm">
                            <div class="form-group"><label>Test Title *</label><input type="text" id="testTitle" placeholder="e.g., HTML Basics Quiz" required></div>
                            <div class="form-group"><label>Description</label><textarea id="testDesc" placeholder="Brief description..."></textarea></div>
                            <div class="form-group"><label>Duration (minutes) *</label><input type="number" id="testDuration" placeholder="30" min="1" required></div>
                            <div class="form-group"><label>Passing Percentage (%)</label><input type="number" id="passingPct" value="40" min="0" max="100"></div>
                            <div class="form-group"><label>Status</label><select id="testStatus"><option value="active">✅ Active</option><option value="draft">📝 Draft</option></select></div>
                            <button type="submit" class="btn-submit">✅ Create Test</button>
                        </form>
                    </div>
                    <div class="form-card success-box" id="successBox"><div style="font-size:4rem">🎉</div><h3>Test Created!</h3><p>Test ID: <strong id="newTestId"></strong></p><a href="add-questions.html" class="btn btn-primary" style="display:inline-block;padding:10px 24px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border-radius:10px;text-decoration:none;font-weight:600;margin-top:10px">➕ Add Questions</a><br><button class="btn btn-outline" style="margin-top:10px;padding:8px 20px;border:1.5px solid var(--border);background:white;border-radius:8px;cursor:pointer;font-weight:600" onclick="createAnother()">Create Another</button></div>
                    <div class="form-card form-full"><h2>📋 Existing Tests</h2><div id="existingTests"><div class="empty-state"><i class='bx bx-file'></i><p>No tests yet. Create your first test!</p></div></div></div>
                </div>
            </div>
        </main>
    </div>
    <script src="../assets/js/firebase-config.js"></script>
    <script src="../assets/js/sheets-api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/common.js"></script>
    <script>
        document.getElementById('menuToggle').addEventListener('click',()=>{document.getElementById('sidebar').classList.toggle('open')});
        auth.onAuthStateChanged(async(user)=>{if(!user){window.location.href='login.html';return}document.getElementById('adminEmail').textContent=user.email;loadExistingTests()});
        document.getElementById('testForm').addEventListener('submit',async(e)=>{e.preventDefault();const d={id:'TEST_'+Date.now(),title:document.getElementById('testTitle').value,description:document.getElementById('testDesc').value,duration:document.getElementById('testDuration').value,passingPercentage:document.getElementById('passingPct').value,status:document.getElementById('testStatus').value,createdBy:auth.currentUser.email,createdAt:new Date().toISOString()};const r=await callSheetAPI('createTest',d);if(r&&r.success){document.getElementById('createForm').style.display='none';document.getElementById('successBox').classList.add('show');document.getElementById('newTestId').textContent=d.id;loadExistingTests()}});
        function createAnother(){document.getElementById('createForm').style.display='block';document.getElementById('successBox').classList.remove('show');document.getElementById('testForm').reset()}
        async function loadExistingTests(){const t=await callSheetAPI('getAllTests');const c=document.getElementById('existingTests');if(t&&t.length>0){c.innerHTML=t.map(x=>`<div class="test-list-item"><div><strong>${x.title}</strong> <span class="status-badge ${x.status}">${x.status}</span><br><small>${x.duration} mins | ${x.id}</small></div><a href="add-questions.html?testId=${x.id}" class="btn btn-sm btn-outline">Add Questions</a></div>`).join('')}else{c.innerHTML='<div class="empty-state"><i class="bx bx-file"></i><p>No tests yet. Create your first test!</p></div>'}}
    </script>
</body>
</html>
